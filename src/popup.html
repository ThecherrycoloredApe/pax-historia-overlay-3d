<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Pax Historia — Overlay 3D</title>
  <style>
    :root { color-scheme: dark; }
    body {
      width: 340px; margin: 0; padding: 12px 14px;
      background: #16181d; color: #e8eaee;
      font: 13px/1.45 system-ui, sans-serif;
    }
    h1 { font-size: 14px; margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
    h1 .dot { width: 9px; height: 9px; border-radius: 50%; background: #34c759; }
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      background: #1f2229; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px;
    }
    .toggle-row input { transform: scale(1.2); accent-color: #34c759; }
    .hint { color: #9aa2ab; font-size: 12px; margin: 8px 0; }
    ul { list-style: none; margin: 0; padding: 0; max-height: 380px; overflow-y: auto; }
    li {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 7px; margin-bottom: 4px; background: #1c1f25;
    }
    li .emoji { font-size: 16px; width: 22px; text-align: center; flex: none; }
    li .info { flex: 1; min-width: 0; }
    li .name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    li .meta { color: #9aa2ab; font-size: 11px; }
    li .state { font-size: 11px; padding: 2px 7px; border-radius: 10px; flex: none; }
    .state.under_construction { background: #4a3d12; color: #f5c443; }
    .state.built { background: #143d22; color: #4cd964; }
    .state.destroyed { background: #46201d; color: #ff6b5e; }
    li button {
      flex: none; background: none; border: none; color: #6b7280;
      cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 5px;
    }
    li button:hover { background: #3a2325; color: #ff6b5e; }
    .counts { color: #9aa2ab; font-size: 11px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1><span class="dot"></span>Pax Historia — Overlay 3D</h1>
  <div class="toggle-row">
    <span>Afficher l'overlay</span>
    <input type="checkbox" id="toggle" checked />
  </div>
  <div class="toggle-row">
    <span>Masquer les symboles du jeu<br /><small style="color:#9aa2ab">(remplacés par les icônes — survol : fiche, clic : fiche du jeu)</small></span>
    <input type="checkbox" id="toggle-labels" checked />
  </div>
  <div class="toggle-row">
    <span>Bâtiments 3D en zoom rapproché<br /><small style="color:#9aa2ab">(décoché : icônes à tous les niveaux de zoom)</small></span>
    <input type="checkbox" id="toggle-models" checked />
  </div>
  <div id="content"><p class="hint">Chargement…</p></div>
  <script src="popup.js"></script>
</body>
</html>
